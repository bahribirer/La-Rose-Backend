events {}

http {
 include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /dev/stdout;
  error_log  /dev/stderr info;

  map $http_upgrade $connection_upgrade {
    default "close";
    "websocket" "upgrade";
  }

  server {
    listen 80;

    # --- Backend API ---
    location /api/ {
      proxy_pass http://backend:8000/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # --- Centrifugo WebSocket ---
    location /connection/websocket {
      proxy_pass http://centrifugo:8000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 600s;
    }

    # --- /grafana (no slash) -> /grafana/ ---
    # --- /grafana (no slash) -> /grafana/ ---
# --- /grafana (no slash) -> /grafana/ ---
location = /grafana { return 301 /grafana/; }

# --- Grafana (sub-path: /grafana/) ---
location /grafana/ {
  # CRITICAL: subpath'li proxy_pass — upstream de /grafana/... görsün
  proxy_pass http://grafana:3000/grafana/;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Prefix /grafana;

  # Mutlak redirect’ları /grafana/ altına çevir
  proxy_redirect http://grafana:3000/grafana/ /grafana/;
}



    # --- Frontend ---
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri /index.html;
    }
  }
}
