name: 🚀 Backend CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================================
  # 1️⃣ LINT & TEST
  # ============================================================
  lint:
    name: 🔍 Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app/main.py

      - name: Check imports
        env:
          CI_MOCK: "true"
          FIREBASE_CREDENTIALS_PATH: ""
          OPENAI_API_KEY: "mock-key"
          TWILIO_ACCOUNT_SID: "mock-sid"
          TWILIO_AUTH_TOKEN: "mock-token"
          JWT_SECRET: "mock-secret"
          APP_NAME: "MockApp"
          MONGO_URI: "mongodb://localhost:27017"
          DB_NAME: "mock_db"
          JWT_ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          GOOGLE_APPLICATION_CREDENTIALS: ""
          TWILIO_VERIFY_SID: "mock-verify"
          TWILIO_FROM_NUMBER: "+1234567890"
          API_BASE_URL: "http://localhost:8000"
          GROQ_API_KEY: "mock-groq"
        run: |
          python -c "
          import importlib
          modules = [
            'app.main',
            'app.auth.router',
            'app.users.router',
            'app.admin.router',
            'app.competitions.router',
            'app.sales.router',
            'app.pharmacies.router',
          ]
          for m in modules:
            try:
              importlib.import_module(m)
              print(f'✅ {m}')
            except Exception as e:
              print(f'❌ {m}: {e}')
              exit(1)
          "

  # ============================================================
  # 2️⃣ DEPLOY (sadece main branch push'larında)
  # ============================================================
  deploy:
    name: 🚀 Deploy to Production
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            cd ${{ secrets.EC2_PROJECT_DIR }}

            echo "🛑 STEP 1: Surgical port cleanup (Port 8000)..."
            # 1a: Stop and remove related container
            docker stop rosap-backend 2>/dev/null || true
            docker rm -f rosap-backend 2>/dev/null || true
            # 1b: Use fuser or lsof to kill EXACTLY what is on port 8000 (surgical, won't kill SSH)
            sudo fuser -k 8000/tcp 2>/dev/null || true
            for pid in $(sudo lsof -t -i:8000 2>/dev/null); do sudo kill -9 $pid 2>/dev/null || true; done
            sleep 2
            echo "✅ Port 8000 is now free"

            echo "🧹 STEP 2: Docker cache temizliği..."
            docker system prune -af || true
            docker builder prune -af || true

            echo "📦 STEP 3: Pulling latest code..."
            git pull origin main

            echo "🔨 STEP 4: Building Docker image..."
            docker build -t rosap-backend -f Dockerfile .

            echo "🚀 STEP 5: Starting container..."
            docker run -d --name rosap-backend -p 0.0.0.0:8000:8000 \
              --env-file .env \
              -e FIREBASE_CREDENTIALS_PATH=/app/app/creds/firebase.json \
              -e GOOGLE_APPLICATION_CREDENTIALS=/app/app/creds/firebase.json \
              -e DOCAI_CREDENTIALS_PATH=/app/app/creds/google.json \
              -v $(pwd)/uploads:/app/uploads \
              -v $(pwd)/app/creds:/app/app/creds:ro \
              --restart unless-stopped rosap-backend

            echo "⏳ Waiting for startup..."
            sleep 15

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.EC2_PROJECT_DIR }}
            echo "📊 Container status:"
            docker ps -a --filter name=rosap-backend --format "ID={{.ID}} Status={{.Status}} Ports={{.Ports}}"
            echo ""
            echo "📋 Container logs (last 30 lines):"
            docker logs rosap-backend --tail 30 2>&1 || echo "(no container found)"
            echo ""
            echo "📁 File checks:"
            ls -la .env 2>/dev/null && echo ".env exists" || echo ".env NOT FOUND!"
            ls -la app/creds/firebase.json 2>/dev/null && echo "firebase.json exists" || echo "firebase.json NOT FOUND!"
            ls -la app/creds/google.json 2>/dev/null && echo "google.json exists" || echo "google.json NOT FOUND!"
            echo ""
            HEALTH=$(curl -sf http://localhost:8000/health 2>/dev/null)
            if [ $? -eq 0 ]; then
              echo "✅ Health check passed!"
              echo "$HEALTH"
            else
              echo "❌ Health check FAILED!"
              exit 1
            fi

  # ============================================================
  # 3️⃣ POST-DEPLOY NOTIFY
  # ============================================================
  notify:
    name: 📢 Notify
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deploy başarılı!"
          echo "🕐 $(date)"
          echo "📝 Commit: ${{ github.sha }}"

      - name: Failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deploy başarısız!"
          echo "🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
