name: 🚀 Backend CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================================
  # 1️⃣ LINT & TEST
  # ============================================================
  lint:
    name: 🔍 Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app/main.py

      - name: Check imports
        env:
          CI_MOCK: "true"
          FIREBASE_CREDENTIALS_PATH: ""
          OPENAI_API_KEY: "mock-key"
          TWILIO_ACCOUNT_SID: "mock-sid"
          TWILIO_AUTH_TOKEN: "mock-token"
          JWT_SECRET: "mock-secret"
          APP_NAME: "MockApp"
          MONGO_URI: "mongodb://localhost:27017"
          DB_NAME: "mock_db"
          JWT_ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          GOOGLE_APPLICATION_CREDENTIALS: ""
          TWILIO_VERIFY_SID: "mock-verify"
          TWILIO_FROM_NUMBER: "+1234567890"
          API_BASE_URL: "http://localhost:8000"
          GROQ_API_KEY: "mock-groq"
        run: |
          python -c "
          import importlib
          modules = [
            'app.main',
            'app.auth.router',
            'app.users.router',
            'app.admin.router',
            'app.competitions.router',
            'app.sales.router',
            'app.pharmacies.router',
          ]
          for m in modules:
            try:
              importlib.import_module(m)
              print(f'✅ {m}')
            except Exception as e:
              print(f'❌ {m}: {e}')
              exit(1)
          "

  # ============================================================
  # 2️⃣ DEPLOY (sadece main branch push'larında)
  # ============================================================
  deploy:
    name: 🚀 Deploy to Production
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            cd ${{ secrets.EC2_PROJECT_DIR }}

            echo "🛑 STEP 1: Intensive name & port cleanup..."
            # 1a: Identify and stop any systemd service that might be restarting the container
            echo "🔍 Checking for background services..."
            SERVICE_NAME=$(systemctl list-units --type=service --all | grep -i "rosap" | awk '{print $1}' | head -n 1)
            if [ ! -z "$SERVICE_NAME" ]; then
              echo "⚠️ Found background service: $SERVICE_NAME. Stopping it..."
              sudo systemctl stop "$SERVICE_NAME" || true
            fi

            # 1b: Stop/Remove container by name - Filtered query for maximum accuracy
            echo "🧹 Removing container rosap-backend..."
            docker ps -aq --filter name=rosap-backend | xargs -r docker rm -f || true
            
            # 1c: Port 8001 check (urgical kill)
            sudo fuser -k 8001/tcp 2>/dev/null || true
            sleep 3
            echo "✅ Name and Port 8001 are now free"

            echo "🔨 STEP 4: Creating .env and building with Compose..."
            # GitHub Secrets'ları .env dosyasına yaz
            cat <<EOF > .env
            APP_NAME=Rosap API
            MONGO_HOST=mongodb
            MONGO_PORT=27017
            MONGO_USER=${{ secrets.MONGO_USER }}
            MONGO_PASS=${{ secrets.MONGO_PASS }}
            DB_NAME=rosap_db
            MONGO_INITDB_ROOT_USERNAME=${{ secrets.MONGO_USER }}
            MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_PASS }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ALGORITHM=HS256
            ACCESS_TOKEN_EXPIRE_MINUTES=1440
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            GOOGLE_APPLICATION_CREDENTIALS=/app/app/creds/firebase.json
            FIREBASE_CREDENTIALS_PATH=/app/app/creds/firebase.json
            DOCAI_CREDENTIALS_PATH=/app/app/creds/google.json
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_VERIFY_SID=${{ secrets.TWILIO_VERIFY_SID }}
            TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}
            API_BASE_URL=https://api.rosapmobile.com
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            EOF

            # Docker Build (Buildx sürüm hatasını önlemek için ayrı yapıyoruz)
            echo "🔨 STEP 5: Building Docker image manually..."
            docker build -t rosap-backend -f Dockerfile .

            # Docker Compose ile backend'i ayağa kaldır (Build gerektirmez, mevcut imajı kullanır)
            echo "🚀 STEP 6: Starting with Compose..."
            docker compose -f docker-compose.rosap.yml up -d --no-build backend

            echo "⏳ Waiting for startup..."
            sleep 15

            echo "🌐 STEP 6: SSL Certificate Check & Nginx Reload..."
            # SSL Sertifikası yoksa almayı dene (api.rosapmobile.com)
            if [ ! -d "/home/ec2-user/la-rosee/certbot/conf/live/api.rosapmobile.com" ]; then
              echo "🔒 SSL certificate not found. Requesting new certificate..."
              docker run --rm -v $(pwd)/certbot/conf:/etc/letsencrypt -v $(pwd)/certbot/www:/var/www/certbot \
                certbot/certbot certonly --webroot -w /var/www/certbot \
                -d api.rosapmobile.com --email bahribirer@gmail.com --agree-tos --no-eff-email --non-interactive || echo "⚠️ SSL generation failed (DNS might not be ready)"
            fi

            # Nginx ayarlarını test et ve reload/restart et
            docker exec rosap-nginx nginx -t 2>/dev/null && docker restart rosap-nginx 2>/dev/null || true
            sudo nginx -t 2>/dev/null && sudo systemctl reload nginx 2>/dev/null || true

            echo "🔍 DIAGNOSTIC: Checking port 8001..."
            sudo ss -tlnp | grep ':8001 ' || echo "Port 8001 is NOT listening!"
            docker ps -a | grep rosap-backend

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.EC2_PROJECT_DIR }}
            echo "📊 Container status:"
            docker ps -a --filter name=rosap-backend --format "ID={{.ID}} Status={{.Status}} Ports={{.Ports}}"
            echo ""
            echo "📋 Container logs (last 30 lines):"
            docker logs rosap-backend --tail 30 2>&1 || echo "(no container found)"
            echo ""
            echo "📁 File checks (looking in /home/ec2-user/creds):"
            ls -la .env 2>/dev/null && echo ".env exists" || echo ".env NOT FOUND!"
            ls -la /home/ec2-user/creds/firebase.json 2>/dev/null && echo "firebase.json exists" || echo "firebase.json NOT FOUND!"
            ls -la /home/ec2-user/creds/google.json 2>/dev/null && echo "google.json exists" || echo "google.json NOT FOUND!"
            echo ""
            HEALTH=$(curl -sf http://localhost:8001/health 2>/dev/null)
            if [ $? -eq 0 ]; then
              echo "✅ Health check passed on port 8001!"
              echo "$HEALTH"
            else
              echo "❌ Health check FAILED on port 8001!"
              exit 1
            fi

  # ============================================================
  # 3️⃣ POST-DEPLOY NOTIFY
  # ============================================================
  notify:
    name: 📢 Notify
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deploy başarılı!"
          echo "🕐 $(date)"
          echo "📝 Commit: ${{ github.sha }}"

      - name: Failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deploy başarısız!"
          echo "🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
